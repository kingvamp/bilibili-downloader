<!DOCTYPE html>
<html>

<head>
    <title>Bilibili Downloader</title>
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1e1e1e;
            color: #ccc;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            border-radius: 8px;
            border: 1px solid #333;
            box-sizing: border-box;
        }

        header {
            height: 40px;
            background: #252526;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 0 0 15px;
            border-radius: 8px 8px 0 0;
            user-select: none;
            -webkit-app-region: drag;
        }

        .app-title {
            font-weight: bold;
            color: #00A1D6;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .header-right {
            display: flex;
            align-items: center;
            height: 100%;
            -webkit-app-region: no-drag;
        }

        .user-area {
            margin-right: 15px;
            display: flex;
            align-items: center;
            -webkit-app-region: no-drag;
        }

        .login-btn {
            background: #fb7299;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .user-profile {
            display: none;
            align-items: center;
            gap: 8px;
            background: #333;
            padding: 2px 8px;
            border-radius: 12px;
            border: 1px solid #444;
        }

        .user-profile img {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        .settings-btn {
            background: transparent;
            border: none;
            color: #888;
            cursor: pointer;
            padding: 0 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .settings-btn:hover {
            color: #fff;
            background: #333;
        }

        .settings-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .window-controls {
            display: flex;
            height: 100%;
        }

        .win-btn {
            width: 46px;
            height: 100%;
            border: none;
            background: transparent;
            color: #ccc;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            outline: none;
        }

        .win-btn:hover {
            background: #3c3c3c;
        }

        .close-btn:hover {
            background: #c42b1c;
            color: white;
            border-top-right-radius: 8px;
        }

        .win-btn svg {
            width: 12px;
            height: 12px;
            fill: currentColor;
        }

        main {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        .input-group {
            display: flex;
            width: 100%;
            max-width: 600px;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            background: #2d2d2d;
            border: 2px solid #444;
            color: white;
            border-radius: 6px;
            outline: none;
            transition: 0.2s;
            font-size: 14px;
        }

        input[type="text"]:focus {
            border-color: #00A1D6;
            background: #333;
        }

        .download-btn {
            padding: 0 25px;
            background: linear-gradient(135deg, #00A1D6, #00b5e5);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
            font-weight: bold;
            font-size: 14px;
            transition: 0.2s;
        }

        .download-btn:hover {
            filter: brightness(1.1);
            box-shadow: 0 2px 8px rgba(0, 161, 214, 0.4);
        }

        .download-btn:active {
            transform: scale(0.98);
        }

        .secondary-btn {
            background: #444;
            padding: 0 15px;
            font-size: 12px;
        }

        .secondary-btn:hover {
            background: #555;
            box-shadow: none;
            filter: none;
        }

        .option-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: 0.2s;
            font-size: 14px;
            color: #ccc;
        }

        .option-label:hover {
            color: #fff;
        }

        .option-label input[type="checkbox"] {
            margin-right: 8px;
            cursor: pointer;
            accent-color: #00A1D6;
            width: 16px;
            height: 16px;
        }

        #log {
            width: 100%;
            max-width: 600px;
            flex: 1;
            background: #111;
            padding: 15px;
            border-radius: 6px;
            font-family: Consolas, monospace;
            font-size: 12px;
            white-space: pre-wrap;
            border: 1px solid #333;
            overflow-y: auto;
            word-break: break-all;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            border-radius: 8px;
        }

        /* 增加相对定位，方便绝对定位右上角的X按钮 */
        .modal-content {
            background: #252526;
            padding: 25px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            width: 300px;
            position: relative;
        }

        /* 【新增】弹窗右上角关闭按钮样式 */
        .modal-close-icon {
            position: absolute;
            top: 12px;
            right: 12px;
            background: transparent;
            border: none;
            color: #888;
            cursor: pointer;
            padding: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            transition: 0.2s;
        }

        .modal-close-icon:hover {
            color: #fff;
            background: #c42b1c;
        }

        .modal-close-icon svg {
            width: 10px;
            height: 10px;
            fill: currentColor;
        }

        .modal-btn {
            padding: 10px 0;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
            border: none;
            outline: none;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid #555;
            color: #ccc;
        }

        .btn-cancel:hover {
            background: #333;
            color: #fff;
        }

        .btn-save {
            background: #00A1D6;
            color: #fff;
        }

        .btn-save:hover {
            background: #00b5e5;
        }

        #qr-img {
            width: 180px;
            height: 180px;
            background: #fff;
            border-radius: 4px;
        }

        .setting-item {
            margin-bottom: 15px;
            text-align: left;
        }

        .setting-title {
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
            display: block;
        }
    </style>
</head>

<body>
    <header>
        <div class="app-title">📺 Bilibili Downloader</div>
        <div class="header-right">
            <div class="user-area">
                <button id="loginBtn" class="login-btn">扫码登录</button>
                <div id="userProfile" class="user-profile">
                    <img id="userFace" src="" alt="">
                    <span id="userName">User</span>
                </div>
            </div>
            <button class="settings-btn" id="openSettingsBtn" title="打开设置">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z" />
                </svg>
            </button>
            <div class="window-controls">
                <button class="win-btn" id="minBtn" title="隐藏窗口"><svg viewBox="0 0 10 1">
                        <path d="M0 0h10v1H0z" />
                    </svg></button>
                <button class="win-btn" id="maxBtn" title="最大化"><svg viewBox="0 0 10 10">
                        <path d="M0 0h10v10H0V0zm1 1v8h8V1H1z" />
                    </svg></button>
                <button class="win-btn close-btn" id="closeBtn" title="关闭到系统托盘"><svg viewBox="0 0 10 10">
                        <path d="M10 1L9 0 5 4 1 0 0 1l4 4-4 4 1 1 4-4 4 4 1-1-4-4z" />
                    </svg></button>
            </div>
        </div>
    </header>

    <main>
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="粘贴视频链接、收藏夹链接 或 播单数字ID">
            <button id="downloadBtn" class="download-btn">解析并下载</button>
        </div>
        <div id="log">等待任务...</div>
    </main>

    <div id="loginModal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin-top: 0;">📱 扫码登录</h3>
            <img id="qr-img" src="" />
            <div id="qr-status" style="margin: 10px 0; font-size: 12px; color: #888;">正在加载...</div>
            <button class="modal-btn btn-cancel" style="width: 100%; margin-top: 15px;"
                onclick="closeModal()">关闭</button>
        </div>
    </div>

    <div id="settingsModal" class="modal-overlay">
        <div class="modal-content" style="width: 380px;">
            <button class="modal-close-icon" id="closeSettingsIcon" title="关闭且不保存">
                <svg viewBox="0 0 10 10">
                    <path d="M10 1L9 0 5 4 1 0 0 1l4 4-4 4 1 1 4-4 4 4 1-1-4-4z" />
                </svg>
            </button>

            <h3 style="margin-top: 0; margin-bottom: 20px; color: #fff;">⚙️ 偏好设置</h3>

            <div class="setting-item">
                <span class="setting-title">默认下载保存目录</span>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="dirInput" readonly
                        style="flex:1; padding: 8px; background: #222; border: 1px solid #444; color: #ccc; border-radius: 4px; font-size: 12px; outline:none; cursor: pointer;">
                    <button id="browseBtn" class="download-btn secondary-btn">更改</button>
                </div>
            </div>

            <div class="setting-item" style="margin-top: 25px;">
                <label class="option-label" title="开启后，复制B站链接会自动唤醒窗口并填入">
                    <input type="checkbox" id="clipboardCb"> 自动监听并提取剪贴板链接
                </label>
            </div>

            <div class="setting-item" style="margin-top: 15px;">
                <label class="option-label" title="同时下载所有外挂字幕文件并封装">
                    <input type="checkbox" id="subCb"> 下载并封装双轨字幕 (人工+AI)
                </label>
            </div>

            <div style="margin-top: 30px;">
                <button class="modal-btn btn-save" id="saveSettingsBtn" style="width: 100%;">保存并应用</button>
            </div>
        </div>
    </div>

    <script src="./dist/renderer.js"></script>
</body>

</html>
